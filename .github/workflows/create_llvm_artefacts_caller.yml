# Temporary for testing - move to planned_testing_caller.yml
name: Try out llvm artefacts
on:
  pull_request:
    paths:
      - '.github/workflows/create_llvm_artefacts.yml'
      - '.github/workflows/create_llvm_artefacts_caller.yml'
  schedule:
    # Run Mon-Fri at 7pm
    - cron: '00 19 * * 1-5'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_llvm_artefacts:
    name: Call PR testing on schedule
    # uncomment and change llvm_source/needs: below to download from a previous day.
    # if: false
    if: ${{ (github.event_name == 'schedule' && github.repository == 'uxlfoundation/oneapi-construction-kit') || github.event_name == 'pull_request' }}
    uses: ./.github/workflows/create_llvm_artefacts.yml
    secrets: inherit
    with:
      llvm_branch: 'release/19.x'
      llvm_branch_id: '19'
      use_github_cache: true

  # use_llvm_artefacts_planned_testing:
  #   needs: [build_llvm_artefacts]
  #   name: run some form of planned testing
  #   uses: ./.github/workflows/planned_testing.yml
  #   with:
  #     target_list: '[ "host_x86_64_linux",
  #                     "host_aarch64_linux",
  #                     "host_riscv64_linux",
  #                     "host_i686_linux",
  #                     "host_refsi_linux",
  #                     "host_x86_64_windows" ]'
  #     ock: true
  #     test_tornado: false
  #     test_sycl_cts: false
  #     test_opencl_cts: false
  #     # Override this value if we wish to use a previous llvm source
  #     llvm_source: ${{ github.run_id }}

  use_llvm_artefacts_run_prs:
    needs: [build_llvm_artefacts]
    uses: ./.github/workflows/run_pr_tests.yml
    # secrets: inherit
    with:
      is_pull_request: false
      # ${{ github.event_name != 'schedule' }}
      # Can replace this with a previous workflow to run without waiting for llvm build
      # We may want to disable needs: and disable original build_llvm_artefacts
      llvm_source: ${{ github.run_id }}
      # 13840910307
      llvm_current: 19
      llvm_previous: 19
      # github_token: ${{ secrets.GITHUB_TOKEN }}
      
